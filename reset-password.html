<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Ascend Faith & Fitness</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0D1B2A; --navy-dark: #080F17; --orange: #E87722; --orange-dark: #C9641A; --white: #FFFFFF; --gray-200: #E5E7EB; --gray-400: #9CA3AF; --gray-600: #6B7280; --gray-800: #1F2937; }
    body { font-family: 'Inter', sans-serif; background: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: var(--navy-dark); padding: 0 32px; height: 64px; display: flex; align-items: center; }
    .nav-logo img { height: 44px; width: auto; mix-blend-mode: screen; }
    .page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .card { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 440px; }
    .card-header { text-align: center; margin-bottom: 32px; }
    .card-header h1 { font-size: 26px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
    .card-header p { font-size: 15px; color: var(--gray-600); line-height: 1.6; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-800); margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 15px; font-family: 'Inter', sans-serif; color: var(--gray-800); outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--orange); }
    .submit-btn { width: 100%; background: var(--orange); color: white; border: none; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .submit-btn:hover { background: var(--orange-dark); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .back-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--gray-600); }
    .back-link a { color: var(--orange); text-decoration: none; font-weight: 600; }
    .msg { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 18px; display: none; }
    .msg-success { background: #F0FDF4; border: 1px solid #BBF7D0; color: #16A34A; }
    .msg-error { background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<nav><a href="/"><img src="Ascend_logo_.png" alt="Ascend Faith & Fitness" /></a></nav>
<div class="page-wrap">
  <div class="card">

    <!-- STEP 1: Request reset -->
    <div id="step-request">
      <div class="card-header">
        <h1>Forgot your password?</h1>
        <p>Enter your email and we'll send you a link to reset your password.</p>
      </div>
      <div id="msg-request" class="msg"></div>
      <form id="request-form">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="reset-email" placeholder="you@email.com" required />
        </div>
        <button type="submit" class="submit-btn" id="request-btn">
          <span id="request-btn-text">Send reset link</span>
          <div class="spinner" id="request-spinner"></div>
        </button>
      </form>
      <div class="back-link"><a href="/login.html">← Back to sign in</a></div>
    </div>

    <!-- STEP 2: Set new password (shown after clicking email link) -->
    <div id="step-reset" style="display:none;">
      <div class="card-header">
        <h1>Set new password</h1>
        <p>Choose a strong password for your Ascend account.</p>
      </div>
      <div id="msg-reset" class="msg"></div>
      <form id="reset-form">
        <div class="form-group">
          <label>New password</label>
          <input type="password" id="new-password" placeholder="At least 8 characters" required minlength="8" />
        </div>
        <div class="form-group">
          <label>Confirm new password</label>
          <input type="password" id="confirm-password" placeholder="Repeat your password" required />
        </div>
        <button type="submit" class="submit-btn" id="reset-btn">
          <span id="reset-btn-text">Update password</span>
          <div class="spinner" id="reset-spinner"></div>
        </button>
      </form>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ohzgachjklmtoovjjmqx.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oemdhY2hqa2xtdG9vdmpqbXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTA1NDYsImV4cCI6MjA5NjUyNjU0Nn0.IbhlirdBScnEbghjsUgn4UgXWovHihVJ_TOqFT32144';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Check if this is a reset link (has access_token in URL)
  const hash = window.location.hash;
  if (hash && hash.includes('type=recovery')) {
    document.getElementById('step-request').style.display = 'none';
    document.getElementById('step-reset').style.display = 'block';
  }

  function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'msg ' + (type === 'success' ? 'msg-success' : 'msg-error');
    el.style.display = 'block';
  }

  function setLoading(btnId, spinnerId, textId, loading, text) {
    document.getElementById(btnId).disabled = loading;
    document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
    document.getElementById(textId).textContent = text;
  }

  // Request reset
  document.getElementById('request-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('reset-email').value.trim();
    setLoading('request-btn', 'request-spinner', 'request-btn-text', true, 'Sending...');
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://ascendfaithandfitness.com/reset-password.html'
    });
    setLoading('request-btn', 'request-spinner', 'request-btn-text', false, 'Send reset link');
    if (error) {
      showMsg('msg-request', error.message, 'error');
    } else {
      showMsg('msg-request', 'Check your email! A reset link is on its way from Massimo Bonura | Ascend Faith & Fitness.', 'success');
      document.getElementById('request-form').style.display = 'none';
    }
  });

  // Set new password
  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPass = document.getElementById('new-password').value;
    const confirmPass = document.getElementById('confirm-password').value;
    if (newPass !== confirmPass) { showMsg('msg-reset', 'Passwords do not match.', 'error'); return; }
    if (newPass.length < 8) { showMsg('msg-reset', 'Password must be at least 8 characters.', 'error'); return; }
    setLoading('reset-btn', 'reset-spinner', 'reset-btn-text', true, 'Updating...');
    const { error } = await sb.auth.updateUser({ password: newPass });
    setLoading('reset-btn', 'reset-spinner', 'reset-btn-text', false, 'Update password');
    if (error) {
      showMsg('msg-reset', error.message, 'error');
    } else {
      showMsg('msg-reset', 'Password updated! Redirecting you to your dashboard...', 'success');
      setTimeout(() => window.location.href = '/dashboard.html', 2000);
    }
  });
</script>
</body>
</html>
