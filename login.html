<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Ascend Faith & Fitness</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0D1B2A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ascend" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0D1B2A; --navy-dark: #080F17; --orange: #E87722;
      --orange-dark: #C9641A; --white: #FFFFFF; --off-white: #F8F9FA;
      --gray-200: #E5E7EB; --gray-400: #9CA3AF; --gray-600: #6B7280; --gray-800: #1F2937;
    }
    body { font-family: 'Inter', sans-serif; background: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: var(--navy-dark); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo img { height: 44px; width: auto; mix-blend-mode: screen; }
    .nav-link { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; font-weight: 500; }
    .nav-link:hover { color: white; }
    .page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .card { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 440px; }
    .card-header { text-align: center; margin-bottom: 32px; }
    .card-header h1 { font-size: 26px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
    .card-header p { font-size: 15px; color: var(--gray-600); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-800); margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 15px; font-family: 'Inter', sans-serif; color: var(--gray-800); outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--orange); }
    .submit-btn { width: 100%; background: var(--orange); color: white; border: none; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .submit-btn:hover { background: var(--orange-dark); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider { text-align: center; font-size: 13px; color: var(--gray-400); margin: 20px 0; }
    .signup-link { text-align: center; font-size: 14px; color: var(--gray-600); }
    .signup-link a { color: var(--orange); text-decoration: none; font-weight: 600; }
    .error-msg { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #DC2626; margin-bottom: 18px; display: none; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 520px) { .card { padding: 32px 24px; } }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><img src="Ascend_logo_.png" alt="Ascend Faith & Fitness" /></a>
  <a href="/signup.html" class="nav-link">Create account</a>
</nav>
<div class="page-wrap">
  <div class="card">
    <div class="card-header">
      <h1>Welcome back</h1>
      <p>Sign in to your Ascend account.</p>
    </div>
    <div id="error-msg" class="error-msg"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" required />
      </div>
      <div style="text-align:right;margin-bottom:14px;">
        <a href="/reset-password.html" style="font-size:13px;color:var(--gray-400);text-decoration:none;font-weight:500;">Forgot password?</a>
      </div>
      <button type="submit" class="submit-btn" id="submit-btn">
        <span id="btn-text">Sign in</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
    <div class="divider">— or —</div>
    <div class="signup-link">Don't have an account? <a href="/signup.html">Join Ascend</a></div>
  </div>
</div>
<script>
  const SUPABASE_URL = 'https://ohzgachjklmtoovjjmqx.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oemdhY2hqa2xtdG9vdmpqbXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTA1NDYsImV4cCI6MjA5NjUyNjU0Nn0.IbhlirdBScnEbghjsUgn4UgXWovHihVJ_TOqFT32144';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function setLoading(loading) {
    document.getElementById('submit-btn').disabled = loading;
    document.getElementById('btn-text').textContent = loading ? 'Signing in...' : 'Sign in';
    document.getElementById('spinner').style.display = loading ? 'block' : 'none';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('error-msg').style.display = 'none';
    setLoading(true);
    try {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;

      // Admin account always goes straight to admin panel
      const ADMIN_EMAIL = 'ascend.ff.coaching@gmail.com';
      if (email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
        window.location.href = '/admin.html';
        return;
      }

      // Coaches also go straight to admin panel
      const { data: coachRow } = await sb.from('coaches').select('id').eq('user_id', data.user.id).maybeSingle();
      if (coachRow) {
        window.location.href = '/admin.html';
        return;
      }

      // Check membership and onboarding status
      const { data: profile } = await sb.from('profiles').select('is_member, onboarding_complete').eq('id', data.user.id).single();
      if (profile?.is_member) {
        if (!profile.onboarding_complete) {
          window.location.href = '/onboarding.html';
        } else {
          window.location.href = '/dashboard.html';
        }
      } else {
        window.location.href = '/signup.html';
      }
    } catch (err) {
      showError(err.message || 'Invalid email or password.');
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
